<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KeuTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #01343f, #05475a);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo-section img {
            width: 100px;
            height: 100px;
            margin-bottom: 0;
        }

        .logo-section h1 {
            color: #01343f;
            font-size: 24px;
            font-weight: 600;
            margin-top: -15px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-title h2 {
            color: #01343f;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .login-title .slogan {
            color: #666;
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #01343f;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #01343f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #05475a;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #666;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }

        .divider span {
            padding: 0 10px;
            font-size: 14px;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.3s;
        }

        .google-btn:hover {
            background-color: #f5f5f5;
        }

        .google-btn img {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="./images/LOGO KT.svg" alt="KeuTrack Logo">
            <h1>KeuTrack</h1>
        </div>
        <div class="login-title">
            <p class="slogan">Solusi Pintar Pencatatan Keuangan UMKM.</p>
        </div>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="error-message" id="errorMessage">
                Username atau password salah!
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="divider">
            <span>atau</span>
        </div>

        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="sign_in_with"
             data-shape="rectangular"
             data-logo_alignment="left"
             data-width="100%">
        </div>
    </div>

    <script>
        // Fungsi untuk mendapatkan Google Client ID
        async function getGoogleClientId() {
            try {
                // Coba ambil dari environment variable Netlify
                const response = await fetch('/.netlify/functions/get-env');
                const data = await response.json();
                return data.GOOGLE_CLIENT_ID;
            } catch (error) {
                console.error('Error getting Google Client ID:', error);
                // Fallback ke Client ID langsung (tidak disarankan untuk production)
                return 'YOUR_GOOGLE_CLIENT_ID';
            }
        }

        // Inisialisasi Google Sign-In
        async function initializeGoogleSignIn() {
            const clientId = await getGoogleClientId();
            google.accounts.id.initialize({
                client_id: clientId,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("googleSignIn"),
                { 
                    type: "standard",
                    size: "large",
                    theme: "outline",
                    text: "sign_in_with",
                    shape: "rectangular",
                    logo_alignment: "left",
                    width: "100%"
                }
            );
        }

        // Panggil inisialisasi saat halaman dimuat
        window.onload = initializeGoogleSignIn;

        // Fungsi untuk menangani login biasa
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (username === 'admin' && password === 'admin123') {
                window.location.href = 'dashboard.html';
            } else {
                errorMessage.style.display = 'block';
            }

            return false;
        }

        // Fungsi untuk menangani response dari Google Sign-In
        function handleCredentialResponse(response) {
            // Decode JWT token
            const responsePayload = jwt_decode(response.credential);
            
            console.log("ID: " + responsePayload.sub);
            console.log('Full Name: ' + responsePayload.name);
            console.log('Given Name: ' + responsePayload.given_name);
            console.log('Family Name: ' + responsePayload.family_name);
            console.log("Image URL: " + responsePayload.picture);
            console.log("Email: " + responsePayload.email);

            // Simpan data user ke localStorage
            localStorage.setItem('user', JSON.stringify({
                id: responsePayload.sub,
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture
            }));

            // Redirect ke dashboard
            window.location.href = 'dashboard.html';
        }

        // Fungsi untuk decode JWT token
        function jwt_decode(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }
    </script>
</body>
</html>
