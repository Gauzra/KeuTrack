<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeuTrack - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Google OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2c3e50',
                        secondary: '#64748b',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full mx-4">
            <!-- Logo dan Judul -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <img src="./images/LOGO KT.svg" alt="KeuTrack Logo" class="w-[120px] h-[120px]">
                </div>
                <h1 class="text-3xl font-semibold text-gray-900">Selamat Datang di KeuTrack</h1>
                <p class="text-gray-600 mt-2">Masuk untuk mengelola keuangan bisnismu</p>
            </div>

            <!-- Login Container -->
            <div class="bg-white rounded-lg shadow-sm p-8">
                <!-- Google Sign-In Button -->
                <div class="space-y-6">
                    <div id="g_id_onload"
                         data-client_id="109474537566-johb2fn97km03he16s3cump2k0lf63ht.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleCredentialResponse"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin w-full"
                         data-type="standard"
                         data-shape="rectangular"
                         data-theme="outline"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="left"
                         data-width="100%">
                    </div>
                </div>

                <!-- Informasi -->
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Dengan masuk menggunakan Google, Anda menyetujui
                        <a href="#" class="text-primary hover:underline">Syarat dan Ketentuan</a>
                        serta
                        <a href="#" class="text-primary hover:underline">Kebijakan Privasi</a>
                        kami
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fungsi untuk menangani response dari Google Sign-In
        function handleCredentialResponse(response) {
            // Decode JWT token
            const responsePayload = jwt_decode(response.credential);
            
            // Simpan data user ke localStorage
            localStorage.setItem('currentUser', JSON.stringify({
                id: responsePayload.sub,
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture
            }));

            // Redirect ke dashboard
            window.location.href = 'dashboard.html';
        }

        // Fungsi untuk decode JWT token
        function jwt_decode(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }
    </script>
</body>
</html>
