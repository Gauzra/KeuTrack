<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeuTrack Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font & Icon CDN -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <img src="./images/LOGO KT.svg" alt="KeuTrack Logo">
      <span>KeuTrack</span>
    </div>
    <ul class="nav-menu">
      <li><span class="material-icons">dashboard</span> <span>Dasbor</span></li>
      <li><span class="material-icons">inventory_2</span> <span>Produk/Item</span></li>
      <li><span class="material-icons">swap_horiz</span> <span>Transaksi</span></li>
      <li><span class="material-icons">bar_chart</span> <span>Laporan Keuangan</span></li>
      <li><span class="material-icons">history</span> <span>Riwayat Transaksi</span></li>
      <li><span class="material-icons">cloud_download</span> <span>Export/Backup</span></li>
    </ul>
    <div class="logout">
      <span class="material-icons">logout</span> <span>Log Out</span>
    </div>
  </div>
</body>
</html>
